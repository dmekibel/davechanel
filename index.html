<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>David Mekibel</title>
  <meta name="description" content="Portfolio of David Mekibel. AI artist, creative director, co-founder of Balancē Creative.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css?v=41">
  <link rel="stylesheet" href="css/heaven-os.css?v=41">
  <link rel="stylesheet" href="css/animations.css?v=41">
</head>
<body>
  <main id="desktop" class="desktop" aria-label="Desktop">
    <ul id="desktop-icons" class="desktop-icons" role="list"></ul>
    <div id="windows-root" class="windows-root" aria-live="polite"></div>
  </main>

  <footer id="taskbar" class="taskbar" aria-label="Taskbar">
    <button id="start-btn" class="start" type="button" aria-haspopup="menu" aria-expanded="false">
      <span class="start-logo" aria-hidden="true">✦</span>
      <span class="start-text" data-i18n="Start">Start</span>
    </button>
    <ul id="taskbar-entries" class="taskbar-entries" role="list"></ul>
    <div class="tray">
      <button id="lang-globe" class="tray-globe" type="button" aria-label="Switch language">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <circle cx="8" cy="8" r="7" fill="#4a90d9" stroke="#0a3d6e" stroke-width="0.6"/>
          <path d="M1 8 H15" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
          <path d="M8 1 V15" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
          <path d="M2 5 Q8 7 14 5" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
          <path d="M2 11 Q8 9 14 11" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
          <ellipse cx="8" cy="8" rx="2.8" ry="7" fill="none" stroke="#0a3d6e" stroke-width="0.5"/>
        </svg>
        <span class="lang-code">EN</span>
      </button>
      <span id="clock" class="clock" aria-label="Current time">--:--</span>
    </div>
  </footer>

  <nav id="start-menu" class="start-menu" role="menu" hidden></nav>

  <!-- Welcome screen: original composed layout, Win98-flavored chrome. -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-stripe top">
      <span class="login-build-tag" data-i18n="David Mekibel 2026">David Mekibel 2026</span>
      <span class="login-build-meta"></span>
    </div>

    <div class="login-main">
      <div class="login-left">
        <div class="login-logo" data-i18n="David Mekibel">David Mekibel</div>
        <div class="login-lead"    data-i18n="portfolio website.">portfolio website.</div>
        <div class="login-sub"     data-i18n="Commercial and fine art work.">Commercial and fine art work.</div>
        <div class="login-tagline" data-i18n="To begin, click your user">To begin, click your user</div>
      </div>

      <div class="login-divider" aria-hidden="true"></div>

      <div class="login-right">
        <button id="login-user" class="login-user" type="button">
          <div class="login-avatar">
            <svg viewBox="0 0 48 48" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
              <rect width="48" height="48" fill="#008080"/>
              <circle cx="24" cy="19" r="7" fill="#fff"/>
              <path d="M10 42 C10 30, 38 30, 38 42 Z" fill="#fff"/>
            </svg>
          </div>
          <div class="login-meta">
            <div class="login-name" data-i18n="user1">user1</div>
          </div>
        </button>
      </div>
    </div>

    <div class="login-stripe bottom">
      <div class="login-bottom-actions">
        <button id="login-shutdown" class="login-shutdown" type="button">
          <span class="ic" aria-hidden="true">⏻</span>
          <span data-i18n="Shut Down">Shut Down</span>
        </button>
        <button id="login-sleep" class="login-shutdown" type="button">
          <span class="ic ic-sleep" aria-hidden="true">☾</span>
          <span data-i18n="Sleep">Sleep</span>
        </button>
      </div>
      <div class="login-right-actions">
        <div class="login-help" data-i18n="No password required. Click your name to enter the desktop.">No password required. Click your name to enter the desktop.</div>
        <button id="login-globe" class="tray-globe login-globe" type="button" aria-label="Switch language">
          <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
            <circle cx="8" cy="8" r="7" fill="#4a90d9" stroke="#0a3d6e" stroke-width="0.6"/>
            <path d="M1 8 H15" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
            <path d="M8 1 V15" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
            <path d="M2 5 Q8 7 14 5" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
            <path d="M2 11 Q8 9 14 11" stroke="#0a3d6e" fill="none" stroke-width="0.5"/>
            <ellipse cx="8" cy="8" rx="2.8" ry="7" fill="none" stroke="#0a3d6e" stroke-width="0.5"/>
          </svg>
          <span class="lang-code">EN</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=41"></script>
</body>
</html>
