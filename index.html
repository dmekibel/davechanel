<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Heaven OS — David Mekibel</title>
  <meta name="description" content="Heaven OS — the portfolio of David Mekibel / Dave Chanel. AI artist, creative director, co-founder of Balancē Creative.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/heaven-os.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <main id="desktop" class="desktop" aria-label="Heaven OS desktop">
    <ul id="desktop-icons" class="desktop-icons" role="list"></ul>
    <div id="windows-root" class="windows-root" aria-live="polite"></div>
  </main>

  <footer id="taskbar" class="taskbar" aria-label="Taskbar">
    <button id="start-btn" class="start" type="button" aria-haspopup="menu" aria-expanded="false">
      <span class="start-logo" aria-hidden="true">✦</span>
      <span class="start-text">Start</span>
    </button>
    <ul id="taskbar-entries" class="taskbar-entries" role="list"></ul>
    <div class="tray">
      <button id="lang-switch" class="lang-switch" type="button" aria-haspopup="menu" aria-label="Switch language">EN</button>
      <span id="clock" class="clock" aria-label="Current time">--:--</span>
    </div>
  </footer>

  <nav id="start-menu" class="start-menu" hidden>
    <div class="start-menu-rail" aria-hidden="true">Heaven OS</div>
    <ul class="start-menu-items" role="menu">
      <li role="menuitem" data-program="explorer">Heaven OS (browse all)</li>
      <li class="sep" role="separator"></li>
      <li role="menuitem" data-program="fine-art">Fine Art</li>
      <li role="menuitem" data-program="balance">Balancē Creative</li>
      <li role="menuitem" data-program="about">About Me</li>
      <li role="menuitem" data-program="showreel">Showreel</li>
      <li role="menuitem" data-program="contact">Contact</li>
      <li class="sep" role="separator"></li>
      <li role="menuitem" data-program="recycle">Recycle Bin</li>
    </ul>
  </nav>

  <script type="module" src="js/main.js"></script>
</body>
</html>
