<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Heaven OS — David Mekibel</title>
  <meta name="description" content="Heaven OS — the portfolio of David Mekibel / Dave Chanel. AI artist, creative director, co-founder of Balancē Creative.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css?v=13">
  <link rel="stylesheet" href="css/heaven-os.css?v=13">
  <link rel="stylesheet" href="css/animations.css?v=13">
</head>
<body>
  <main id="desktop" class="desktop" aria-label="Heaven OS desktop">
    <ul id="desktop-icons" class="desktop-icons" role="list"></ul>
    <div id="windows-root" class="windows-root" aria-live="polite"></div>
  </main>

  <footer id="taskbar" class="taskbar" aria-label="Taskbar">
    <button id="start-btn" class="start" type="button" aria-haspopup="menu" aria-expanded="false">
      <span class="start-logo" aria-hidden="true">✦</span>
      <span class="start-text">Start</span>
    </button>
    <ul id="taskbar-entries" class="taskbar-entries" role="list"></ul>
    <div class="tray">
      <span id="clock" class="clock" aria-label="Current time">--:--</span>
    </div>
  </footer>

  <nav id="start-menu" class="start-menu" role="menu" hidden></nav>

  <!-- Welcome screen: original composed layout, Win98-flavored chrome. -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-stripe top">
      <span class="login-build-tag">Heaven OS · v1.0</span>
      <span class="login-build-meta">a Heaven Inc. production</span>
    </div>

    <div class="login-main">
      <div class="login-left">
        <div class="login-logo">Heaven<sup>OS</sup></div>
        <div class="login-tagline">To begin, click your name</div>
      </div>

      <div class="login-divider" aria-hidden="true"></div>

      <div class="login-right">
        <button id="login-user" class="login-user" type="button">
          <div class="login-avatar">
            <svg viewBox="0 0 24 24" width="44" height="44" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
              <rect x="0"  y="0"  width="24" height="24" fill="#fdd55d"/>
              <rect x="8"  y="4"  width="8"  height="6" fill="#fcd5b8"/>
              <rect x="9"  y="10" width="6"  height="2" fill="#fcd5b8"/>
              <rect x="2"  y="14" width="20" height="10" fill="#1f3f80"/>
              <rect x="6"  y="14" width="12" height="2"  fill="#fff"/>
              <rect x="10" y="6"  width="1"  height="1" fill="#000"/>
              <rect x="13" y="6"  width="1"  height="1" fill="#000"/>
              <rect x="11" y="8"  width="2"  height="1" fill="#a86040"/>
            </svg>
          </div>
          <div class="login-meta">
            <div class="login-name">David Mekibel</div>
            <div class="login-intro">Russian-Israeli artist. Co-founder of Balancē Creative.</div>
          </div>
        </button>
      </div>
    </div>

    <div class="login-stripe bottom">
      <div class="login-bottom-actions">
        <button id="login-shutdown" class="login-shutdown" type="button">
          <span class="ic" aria-hidden="true">⏻</span>
          <span>Shut Down</span>
        </button>
        <button id="login-sleep" class="login-shutdown" type="button">
          <span class="ic ic-sleep" aria-hidden="true">☾</span>
          <span>Sleep</span>
        </button>
      </div>
      <div class="login-help">No password required. Click your name to enter the desktop.</div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=13"></script>
</body>
</html>
